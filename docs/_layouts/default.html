<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% if page.path != "index.md" %}{{ page.path | replace: '.md', '' }} · {% endif %}{{ site.title }}</title>
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<script>try{if(localStorage.getItem('crt-off')==='1')document.documentElement.classList.add('crt-off')}catch(e){}</script>
<link rel="stylesheet" href="{{ '/assets/css/crt.css' | relative_url }}">
{% if site.goatcounter %}<script data-goatcounter="https://{{ site.goatcounter }}.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>{% endif %}
</head>
<body>
  <div class="crt">
    <div class="crt__screen">
      <header class="crt__header">
        <span class="crt__prompt"><a href="{{ '/' | relative_url }}">ssk@tech:~$</a> {% if page.path == 'index.md' %}ls docs/{% else %}cat {{ page.path }}{% endif %}</span>
        {% if site.goatcounter %}<img class="crt__views" src="https://{{ site.goatcounter }}.goatcounter.com/counter/{{ page.url | url_encode }}.svg" alt="" onerror="this.style.display='none'">{% endif %}
      </header>
      <main class="crt__content">
        {{ content }}
      </main>
    </div>
    <div class="crt__overlay" aria-hidden="true"></div>
    <div class="crt__vignette" aria-hidden="true"></div>
    <div class="crt__bezel" aria-hidden="true"></div>
  </div>
  <button class="crt__toggle" type="button" aria-pressed="true" title="Toggle CRT shader">CRT</button>
  <script src="{{ '/assets/js/crt-toggle.js' | relative_url }}"></script>
</body>
</html>
